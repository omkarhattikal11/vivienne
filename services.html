let html = "";

for(let i=0;i<images.length;i++){

html += `

<div class="card">

<img src="${images[i]}">

<div class="info">

<div class="rating">
⭐ 4.${i+1} | ${120+(i+1)*20} Reviews
</div>

<h2>${service}</h2>

<div class="price">
₹${500+(i+1)*150}/hour
</div>

<div class="shop">

<span>
Glow Beauty Studio
</span>

<span>
Bangalore
</span>

</div>

<button class="btn"
onclick="bookService('${service}', '${images[i]}', '₹${500+(i+1)*150}/hour')">

Book Now

</button>

</div>

</div>

`;

}

document.getElementById("services")
.innerHTML = html;

async function bookService(name, image, price) {

let orders =
JSON.parse(localStorage.getItem("orders")) || [];

orders.push({
name: name,
image: image,
price: price,
item: "service",
id: 1,
reviewSubmitted: false
});

localStorage.setItem("orders",
JSON.stringify(orders));

try {

let customerName =
localStorage.getItem("name") || "Guest";

let amountStr =
price.replace(/[^0-9]/g, '');

let amount =
parseInt(amountStr) || 0;

await fetch("http://127.0.0.1:5500/api/orders", {

method: "POST",

headers: {
"Content-Type": "application/json"
},

body: JSON.stringify({

customer_name: customerName,

item_name: name,

amount: amount,

seller_name: "Glow Beauty Studio"

})

});

}

catch(e){

console.log("Could not notify seller dashboard", e);

}

alert("Service booked successfully! ✅\nYou can view it in your Orders.");

}
