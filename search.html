let html = "";
let products = [];

// Try exact category match
let foundCatProducts = productDatabase[query];

// Case-insensitive search against categories if exact match fails
if(!foundCatProducts) {
    let lowerCat = Object.keys(productDatabase).find(k => k.toLowerCase() === query);
    if(lowerCat) foundCatProducts = productDatabase[lowerCat];
}

if (foundCatProducts) {
    products = foundCatProducts;
} else {
    // If not a category, search for specific product match
    let foundCategory = null;
    let foundProductStr = null;
    
    Object.keys(productDatabase).forEach(cat => {
        productDatabase[cat].forEach(p => {
            if (p.toLowerCase() === query) {
                foundCategory = cat;
                foundProductStr = p;
            }
        });
    });
    
    if (foundCategory) {
        // Show exact matched product FIRST, then rest of its category
        let catProducts = [...productDatabase[foundCategory]];
        catProducts = catProducts.filter(p => p !== foundProductStr);
        products = [foundProductStr, ...catProducts];
    } else {
        // Fallback: Partial matches across all products
        Object.keys(productDatabase).forEach(cat => {
            productDatabase[cat].forEach(p => {
                if (p.toLowerCase().includes(query)) {
                    products.push(p);
                }
            });
        });
    }
}

if (products.length === 0) {
  html = "<h3 style='grid-column: 1 / -1; text-align: center; color: #8b6837; margin-top: 50px;'>No results found for your search.</h3>";
} else {
  for(let i=1; i<=products.length; i++){
    html += `

<div class="card"
onclick="openProduct('${query}',${i}, '${products[i-1]}')">

<img src="${productImages[products[i-1]] || 'images/' + query + '/' + i + '.jpg'}">

<div class="info">

<div class="rating">

⭐ ${
Math.random() < 0.8

? (Math.random()*1 + 4).toFixed(1)

: (Math.random()*0.9 + 3).toFixed(1)

}

</div>

<h3>${products[i-1]}</h3>
      <p>Shop Name: ${(window.shopData && shopData[query] && shopData[query][i-1]) ? shopData[query][i-1].shop : "Royal Rentals"}</p>
<p>Location: ${(window.shopData && shopData[query] && shopData[query][i-1]) ? shopData[query][i-1].location : "Bangalore"}</p>
    </div>
  </div>
  `;
  }
}

document.getElementById("results").innerHTML = html;

function openProduct(name, id, productName){
  let imgUrl = productImages[productName] || "";

  window.location.href = "product1.html?item=" + name + "&id=" + id + "&product=" + encodeURIComponent(productName) + "&img=" + encodeURIComponent(imgUrl);
}
</script>
